# =============================================================================
# Elastic SIEM Detection Rules: Credential Access
# MITRE ATT&CK Tactic: TA0006 (Credential Access)
# Format: Elastic detection-rules TOML schema
# =============================================================================


# =============================================================================
# Rule 1: LSASS Memory Access
# =============================================================================

[rule]
name = "LSASS Process Memory Access"
description = """
Detects processes accessing LSASS (Local Security Authority Subsystem Service)
memory, which is a primary target for credential dumping tools such as Mimikatz,
ProcDump, and comsvcs.dll MiniDump. Legitimate access is rare and typically
limited to security products and Windows internals.
"""
author = ["Threat Intelligence Blue Team"]
date = "2026-03-24"
language = "kuery"
license = "Elastic License v2"
risk_score = 90
rule_id = "cred-access-001"
severity = "critical"
type = "query"
index = ["winlogbeat-*", "logs-endpoint.events.*", "logs-windows.sysmon_operational-*"]
tags = [
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Credential Access",
    "Data Source: Sysmon",
    "Data Source: Elastic Endpoint",
]

query = '''
event.category:"process" and event.action:"access" and
winlog.event_data.TargetImage:*\\lsass.exe and
not process.executable:(
    "C:\\Program Files\\*" or
    "C:\\Program Files (x86)\\*" or
    "C:\\Windows\\System32\\svchost.exe" or
    "C:\\Windows\\System32\\lsm.exe" or
    "C:\\Windows\\System32\\csrss.exe" or
    "C:\\Windows\\System32\\wininit.exe"
) and
not process.name:("MsMpEng.exe" or "MsSense.exe" or "SenseIR.exe") and
winlog.event_data.GrantedAccess:(
    "0x1010" or "0x1038" or "0x1410" or "0x1438" or "0x143a" or "0x1fffff"
)
'''

[[rule.threat]]
framework = "MITRE ATT&CK"
  [[rule.threat.technique]]
  id = "T1003"
  name = "OS Credential Dumping"
    [[rule.threat.technique.subtechnique]]
    id = "T1003.001"
    name = "LSASS Memory"

  [rule.threat.tactic]
  id = "TA0006"
  name = "Credential Access"


# =============================================================================
# Rule 2: Credential File Access (NTDS.dit / SAM / SECURITY)
# =============================================================================

[rule_2]
name = "Sensitive Credential File Access via Volume Shadow Copy"
description = """
Detects attempts to access or copy sensitive credential files (NTDS.dit, SAM,
SECURITY, SYSTEM registry hives) using volume shadow copies, ntdsutil, or
direct file copy. These files contain hashed credentials that can be extracted
offline.
"""
author = ["Threat Intelligence Blue Team"]
date = "2026-03-24"
language = "eql"
license = "Elastic License v2"
risk_score = 85
rule_id = "cred-access-002"
severity = "high"
type = "eql"
index = ["winlogbeat-*", "logs-endpoint.events.*", "logs-windows.sysmon_operational-*"]
tags = [
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Credential Access",
    "Data Source: Sysmon",
    "Data Source: Elastic Endpoint",
]

query = '''
process where event.type == "start" and
(
  /* ntdsutil invocations for NTDS.dit extraction */
  (process.name : "ntdsutil.exe" and process.args : ("activate*", "ifm", "create*")) or

  /* Volume shadow copy creation for offline credential extraction */
  (process.name : "vssadmin.exe" and process.args : "create" and process.args : "shadow") or
  (process.name : "wmic.exe" and process.args : "shadowcopy" and process.args : "create") or

  /* Direct copy of SAM or SYSTEM hives */
  (process.name : ("cmd.exe", "powershell.exe", "pwsh.exe") and
   process.command_line : ("*\\SAM*", "*\\SYSTEM*", "*\\SECURITY*", "*ntds.dit*") and
   process.command_line : ("*copy*", "*xcopy*", "*robocopy*", "*esentutl*")) or

  /* reg.exe save of credential hives */
  (process.name : "reg.exe" and process.args : "save" and
   process.args : ("hklm\\sam", "hklm\\system", "hklm\\security",
                    "HKLM\\SAM", "HKLM\\SYSTEM", "HKLM\\SECURITY"))
)
'''

[[rule_2.threat]]
framework = "MITRE ATT&CK"
  [[rule_2.threat.technique]]
  id = "T1003"
  name = "OS Credential Dumping"
    [[rule_2.threat.technique.subtechnique]]
    id = "T1003.003"
    name = "NTDS"

  [rule_2.threat.tactic]
  id = "TA0006"
  name = "Credential Access"


# =============================================================================
# Rule 3: Kerberos Ticket Manipulation
# =============================================================================

[rule_3]
name = "Kerberos Ticket Request with RC4 Encryption (Kerberoasting)"
description = """
Detects Kerberos TGS requests using the weak RC4-HMAC encryption type (0x17),
which is indicative of Kerberoasting attacks. Attackers request service tickets
encrypted with RC4 to crack them offline and extract service account passwords.
Also detects abnormal TGT requests that may indicate Golden Ticket usage.
"""
author = ["Threat Intelligence Blue Team"]
date = "2026-03-24"
language = "kuery"
license = "Elastic License v2"
risk_score = 75
rule_id = "cred-access-003"
severity = "high"
type = "threshold"
index = ["winlogbeat-*", "logs-windows.security-*"]
tags = [
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Credential Access",
    "Data Source: Windows Security",
]

query = '''
event.code:"4769" and
winlog.event_data.TicketEncryptionType:"0x17" and
winlog.event_data.Status:"0x0" and
not winlog.event_data.ServiceName:krbtgt* and
not winlog.event_data.TargetUserName:*$
'''

[rule_3.threshold]
field = ["source.ip", "winlog.event_data.TargetUserName"]
value = 3

[[rule_3.threat]]
framework = "MITRE ATT&CK"
  [[rule_3.threat.technique]]
  id = "T1558"
  name = "Steal or Forge Kerberos Tickets"
    [[rule_3.threat.technique.subtechnique]]
    id = "T1558.003"
    name = "Kerberoasting"

  [rule_3.threat.tactic]
  id = "TA0006"
  name = "Credential Access"


# =============================================================================
# Rule 4: SAM Database Access via Registry
# =============================================================================

[rule_4]
name = "SAM Registry Hive Access or Dump"
description = """
Detects access to the SAM registry hive, which contains local account password
hashes. Adversaries may query or dump the SAM hive to extract credentials for
local accounts. Monitors for suspicious registry access events and known
offensive tool patterns.
"""
author = ["Threat Intelligence Blue Team"]
date = "2026-03-24"
language = "eql"
license = "Elastic License v2"
risk_score = 80
rule_id = "cred-access-004"
severity = "high"
type = "eql"
index = ["winlogbeat-*", "logs-endpoint.events.*", "logs-windows.sysmon_operational-*"]
tags = [
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Credential Access",
    "Data Source: Sysmon",
    "Data Source: Elastic Endpoint",
]

query = '''
any where
(
  /* Sysmon Event ID 17/18: Pipe created for SAM access */
  (event.code : ("17", "18") and file.name : "samr") or

  /* Process creation targeting SAM */
  (event.type == "start" and process.name : ("reg.exe", "regedit.exe") and
   process.command_line : "*\\SAM*") or

  /* Mimikatz and secretsdump patterns */
  (event.type == "start" and
   process.command_line : ("*lsadump::sam*", "*secretsdump*", "*samdump2*",
                           "*pwdumpx*", "*hashdump*")) or

  /* Registry event targeting SAM hive */
  (event.code == "4656" and
   winlog.event_data.ObjectName : "*\\SAM" and
   winlog.event_data.AccessMask : ("0x20019", "0x20006", "0xf003f"))
)
'''

[[rule_4.threat]]
framework = "MITRE ATT&CK"
  [[rule_4.threat.technique]]
  id = "T1003"
  name = "OS Credential Dumping"
    [[rule_4.threat.technique.subtechnique]]
    id = "T1003.002"
    name = "Security Account Manager"

  [rule_4.threat.tactic]
  id = "TA0006"
  name = "Credential Access"


# =============================================================================
# Rule 5: Browser Credential Access
# =============================================================================

[rule_5]
name = "Browser Credential Store Access"
description = """
Detects processes accessing browser credential storage files (Chrome Login Data,
Firefox logins.json, Edge Login Data). Attackers commonly target these SQLite
databases and JSON files to extract saved passwords, cookies, and session tokens.
"""
author = ["Threat Intelligence Blue Team"]
date = "2026-03-24"
language = "eql"
license = "Elastic License v2"
risk_score = 65
rule_id = "cred-access-005"
severity = "medium"
type = "eql"
index = ["winlogbeat-*", "logs-endpoint.events.*", "logs-windows.sysmon_operational-*"]
tags = [
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Credential Access",
    "Data Source: Elastic Endpoint",
]

query = '''
file where event.type == "access" and
(
  /* Google Chrome credential files */
  file.path : (
    "*\\AppData\\Local\\Google\\Chrome\\User Data\\*\\Login Data",
    "*\\AppData\\Local\\Google\\Chrome\\User Data\\*\\Cookies",
    "*\\AppData\\Local\\Google\\Chrome\\User Data\\Local State"
  ) or

  /* Mozilla Firefox credential files */
  file.path : (
    "*\\AppData\\Roaming\\Mozilla\\Firefox\\Profiles\\*\\logins.json",
    "*\\AppData\\Roaming\\Mozilla\\Firefox\\Profiles\\*\\key4.db",
    "*\\AppData\\Roaming\\Mozilla\\Firefox\\Profiles\\*\\cookies.sqlite"
  ) or

  /* Microsoft Edge credential files */
  file.path : (
    "*\\AppData\\Local\\Microsoft\\Edge\\User Data\\*\\Login Data",
    "*\\AppData\\Local\\Microsoft\\Edge\\User Data\\*\\Cookies"
  )
) and
not process.executable : (
  "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe",
  "C:\\Program Files\\Mozilla Firefox\\firefox.exe",
  "C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe",
  "C:\\Windows\\System32\\svchost.exe",
  "C:\\Program Files\\*\\backup*"
)
'''

[[rule_5.threat]]
framework = "MITRE ATT&CK"
  [[rule_5.threat.technique]]
  id = "T1555"
  name = "Credentials from Password Stores"
    [[rule_5.threat.technique.subtechnique]]
    id = "T1555.003"
    name = "Credentials from Web Browsers"

  [rule_5.threat.tactic]
  id = "TA0006"
  name = "Credential Access"


# =============================================================================
# Rule 6: DCSync Attack Detection
# =============================================================================

[rule_6]
name = "DCSync Replication Request from Non-Domain Controller"
description = """
Detects Directory Replication Service (DRS) requests originating from hosts that
are not domain controllers. This is characteristic of DCSync attacks where
adversaries use tools like Mimikatz to replicate credentials directly from
Active Directory.
"""
author = ["Threat Intelligence Blue Team"]
date = "2026-03-24"
language = "kuery"
license = "Elastic License v2"
risk_score = 95
rule_id = "cred-access-006"
severity = "critical"
type = "query"
index = ["winlogbeat-*", "logs-windows.security-*"]
tags = [
    "OS: Windows",
    "Use Case: Threat Detection",
    "Tactic: Credential Access",
    "Data Source: Windows Security",
]

query = '''
event.code:"4662" and
winlog.event_data.Properties:(
    "*1131f6aa-9c07-11d1-f79f-00c04fc2dcd2*" or
    "*1131f6ad-9c07-11d1-f79f-00c04fc2dcd2*" or
    "*89e95b76-444d-4c62-991a-0facbeda640c*"
) and
not winlog.event_data.SubjectUserName:*$ and
not source.ip:("10.0.0.1" or "10.0.0.2")
'''

[[rule_6.threat]]
framework = "MITRE ATT&CK"
  [[rule_6.threat.technique]]
  id = "T1003"
  name = "OS Credential Dumping"
    [[rule_6.threat.technique.subtechnique]]
    id = "T1003.006"
    name = "DCSync"

  [rule_6.threat.tactic]
  id = "TA0006"
  name = "Credential Access"
