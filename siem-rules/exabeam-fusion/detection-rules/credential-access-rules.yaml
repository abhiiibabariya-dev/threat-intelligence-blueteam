# Exabeam Fusion - Credential Access Detection Rules
# MITRE ATT&CK Tactic: TA0006

---
rules:
  - rule_name: "EXA-CA-001: Brute Force Authentication"
    description: "Detects multiple failed logins from same source targeting same account"
    severity: high
    risk_score: 85
    mitre_attack: [T1110.001]
    trigger:
      type: correlation
      data_source: authentication
      conditions:
        - field: outcome
          operator: equals
          value: failure
      time_window: 5m
      threshold: 10
      group_by: [src_host, dest_user]
    entity: src_host
    response:
      - create_notable_event
      - add_to_watchlist: "Brute Force Sources"
      - trigger_playbook: "brute-force-investigation"

  - rule_name: "EXA-CA-002: Password Spray Attack"
    description: "Single source failing auth against multiple accounts - password spray pattern"
    severity: high
    risk_score: 90
    mitre_attack: [T1110.003]
    trigger:
      type: correlation
      data_source: authentication
      conditions:
        - field: outcome
          operator: equals
          value: failure
      time_window: 10m
      threshold: 5
      group_by: [src_host]
      distinct_count:
        field: dest_user
        minimum: 5
    entity: src_host
    response:
      - create_notable_event
      - block_source_ip
      - notify_soc: "Password spray detected"

  - rule_name: "EXA-CA-003: LSASS Memory Access"
    description: "Process accessing LSASS memory - credential dumping indicator"
    severity: critical
    risk_score: 95
    mitre_attack: [T1003.001]
    trigger:
      type: real_time
      data_source: endpoint
      conditions:
        - field: target_process
          operator: contains
          value: lsass.exe
        - field: access_mask
          operator: in
          values: ["0x1010", "0x1038", "0x1fffff"]
        - field: source_process
          operator: not_in
          values: ["csrss.exe", "svchost.exe", "wininit.exe", "MsMpEng.exe"]
    entity: host
    response:
      - create_critical_incident
      - isolate_endpoint
      - collect_memory_dump

  - rule_name: "EXA-CA-004: Kerberoasting Activity"
    description: "TGS requests with RC4 encryption for service accounts"
    severity: high
    risk_score: 85
    mitre_attack: [T1558.003]
    trigger:
      type: correlation
      data_source: windows_security
      conditions:
        - field: event_id
          operator: equals
          value: 4769
        - field: ticket_encryption
          operator: in
          values: ["0x17", "0x18"]
      time_window: 5m
      threshold: 3
      group_by: [src_user]
    entity: src_user
    response:
      - create_notable_event
      - enrich_user_context
      - check_service_accounts

  - rule_name: "EXA-CA-005: DCSync Replication Attack"
    description: "Non-DC host performing directory replication - DCSync attack"
    severity: critical
    risk_score: 98
    mitre_attack: [T1003.006]
    trigger:
      type: real_time
      data_source: windows_security
      conditions:
        - field: event_id
          operator: equals
          value: 4662
        - field: properties
          operator: contains_any
          values:
            - "1131f6aa-9c07-11d1-f79f-00c04fc2dcd2"
            - "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2"
        - field: src_host
          operator: not_in
          value: "$domain_controllers"
    entity: src_user
    response:
      - create_critical_incident
      - disable_user_account
      - notify_soc: "DCSync attack - immediate response required"

  - rule_name: "EXA-CA-006: Credential Stuffing"
    description: "High volume of auth attempts with different credentials from single source"
    severity: high
    risk_score: 80
    mitre_attack: [T1110.004]
    trigger:
      type: correlation
      data_source: authentication
      conditions:
        - field: outcome
          operator: equals
          value: failure
      time_window: 15m
      threshold: 50
      group_by: [src_ip]
      distinct_count:
        field: dest_user
        minimum: 20
    entity: src_ip
    response:
      - create_notable_event
      - block_source_ip
      - trigger_playbook: "credential-stuffing-response"

  - rule_name: "EXA-CA-007: Browser Credential Store Access"
    description: "Non-browser process accessing browser credential databases"
    severity: medium
    risk_score: 70
    mitre_attack: [T1555.003]
    trigger:
      type: real_time
      data_source: endpoint
      conditions:
        - field: file_path
          operator: matches_any
          values:
            - "*\\Login Data"
            - "*\\logins.json"
            - "*\\key3.db"
            - "*\\cookies.sqlite"
        - field: process_name
          operator: not_in
          values: ["chrome.exe", "firefox.exe", "msedge.exe", "brave.exe"]
    entity: host
    response:
      - create_notable_event
      - enrich_process_context

  - rule_name: "EXA-CA-008: Anomalous Authentication (UEBA)"
    description: "User authenticating from unusual location, time, or device based on behavioral baseline"
    severity: medium
    risk_score: 75
    mitre_attack: [T1078]
    trigger:
      type: anomaly
      model: user_authentication_baseline
      conditions:
        - field: login_location
          deviation: 3_sigma
        - field: login_time
          deviation: 2_sigma
        - field: source_device
          deviation: new_device
    entity: dest_user
    smart_timeline: true
    response:
      - create_notable_event
      - request_mfa_verification
      - add_risk_score: 25
