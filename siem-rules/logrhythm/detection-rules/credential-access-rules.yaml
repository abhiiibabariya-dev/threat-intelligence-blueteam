# LogRhythm - Credential Access Detection Rules
# MITRE ATT&CK Tactic: TA0006
---
rules:
  - rule_name: "LR-CA-001: LSASS Memory Access"
    rule_type: threshold
    severity: critical
    risk_rating: 10
    mitre: [T1003.001]
    common_event: "Process Access"
    filter:
      target_process: "lsass.exe"
      access_mask_any: ["0x1010", "0x1038", "0x1fffff"]
      source_process_not: [csrss.exe, svchost.exe, MsMpEng.exe]
    threshold: {count: 1, time_window_seconds: 60}
    actions: [create_alarm, smartresponse: "Isolate Host"]

  - rule_name: "LR-CA-002: Kerberoasting - RC4 TGS Request"
    rule_type: threshold
    severity: high
    risk_rating: 8
    mitre: [T1558.003]
    common_event: "Kerberos Service Ticket"
    filter:
      event_id: 4769
      encryption_type_any: ["0x17", "0x18"]
    threshold: {count: 5, time_window_seconds: 300, group_by: [login]}
    actions: [create_alarm, add_to_list: "Kerberoast Suspects"]

  - rule_name: "LR-CA-003: DCSync Attack"
    rule_type: threshold
    severity: critical
    risk_rating: 10
    mitre: [T1003.006]
    common_event: "Directory Service Access"
    filter:
      event_id: 4662
      properties_any: ["1131f6aa-9c07-11d1-f79f-00c04fc2dcd2", "1131f6ad-9c07-11d1-f79f-00c04fc2dcd2"]
      origin_host_not_in_list: "Domain Controllers"
    threshold: {count: 1, time_window_seconds: 60}
    actions: [create_alarm, smartresponse: "Disable Account", send_notification: "IR Team"]

  - rule_name: "LR-CA-004: Credential File Access"
    rule_type: threshold
    severity: medium
    risk_rating: 6
    mitre: [T1552.001]
    common_event: "File Access"
    filter:
      object_name_regex: "(unattend\\.xml|sysprep\\.inf|web\\.config|\\.aws.credentials|shadow$|passwd$)"
    threshold: {count: 1, time_window_seconds: 60}
    actions: [create_alarm]

  - rule_name: "LR-CA-005: SAM/SYSTEM Registry Hive Export"
    rule_type: threshold
    severity: critical
    risk_rating: 9
    mitre: [T1003.002]
    common_event: "Process Creation"
    filter:
      command_contains_all: ["reg", "save"]
      command_contains_any: ["hklm\\sam", "hklm\\security", "hklm\\system"]
    threshold: {count: 1, time_window_seconds: 60}
    actions: [create_alarm, smartresponse: "Kill Process"]

  - rule_name: "LR-CA-006: Network Sniffing"
    rule_type: threshold
    severity: high
    risk_rating: 7
    mitre: [T1040]
    common_event: "Process Creation"
    filter:
      process_any: [tcpdump, tshark, windump, netsh]
      command_contains_any: ["-w ", "trace start capture", "promiscuous"]
    threshold: {count: 1, time_window_seconds: 60}
    actions: [create_alarm]

  - rule_name: "LR-CA-007: Browser Password Store Access"
    rule_type: threshold
    severity: medium
    risk_rating: 6
    mitre: [T1555.003]
    common_event: "File Access"
    filter:
      object_name_any: ["Login Data", "logins.json", "key3.db", "cookies.sqlite"]
      process_not_any: [chrome.exe, firefox.exe, msedge.exe]
    threshold: {count: 1, time_window_seconds: 60}
    actions: [create_alarm]

  - rule_name: "LR-CA-008: NTDS.dit Access"
    rule_type: threshold
    severity: critical
    risk_rating: 10
    mitre: [T1003.003]
    common_event: "Process Creation"
    filter:
      command_contains_any: ["ntds.dit", "ntdsutil", "vssadmin create shadow", "esentutl"]
    threshold: {count: 1, time_window_seconds: 60}
    actions: [create_alarm, smartresponse: "Isolate Host", send_notification: "IR Team"]
