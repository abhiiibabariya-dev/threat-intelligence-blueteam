# Sigma Rules - Lateral Movement Detection
# Compatible with Splunk, Elastic, QRadar

title: PsExec Remote Service Installation
id: sigma-lm-001
status: stable
level: high
description: Detects PsExec-style remote service installation indicating lateral movement
author: Blue Team Toolkit
date: 2024/01/15
tags:
  - attack.lateral_movement
  - attack.t1570
  - attack.t1021.002
logsource:
  product: windows
  service: system
detection:
  selection:
    EventID: 7045
    ServiceName|contains:
      - 'PSEXESVC'
      - 'PAEXEC'
      - 'csexec'
      - 'RemCom'
  condition: selection
falsepositives:
  - Legitimate system administration tools
  - Authorized remote management

---

title: WMI Remote Process Creation
id: sigma-lm-002
status: experimental
level: high
description: Detects use of WMI for remote command execution
author: Blue Team Toolkit
date: 2024/01/15
tags:
  - attack.lateral_movement
  - attack.t1047
  - attack.execution
  - attack.t1059
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - '/node:'
      - 'process call create'
  condition: selection
falsepositives:
  - Legitimate WMI administration
  - SCCM or other management tools

---

title: Remote Desktop Protocol from Unusual Source
id: sigma-lm-003
status: stable
level: medium
description: Detects RDP connections from non-standard internal subnets
author: Blue Team Toolkit
date: 2024/01/15
tags:
  - attack.lateral_movement
  - attack.t1021.001
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 10
  filter:
    SourceNetworkAddress|startswith:
      - '10.10.'
      - '192.168.1.'
  condition: selection and not filter
falsepositives:
  - Remote workers using VPN
  - IT support teams

---

title: SMB Admin Share Access
id: sigma-lm-004
status: experimental
level: high
description: Detects access to administrative shares (C$, ADMIN$) indicating lateral movement
author: Blue Team Toolkit
date: 2024/01/15
tags:
  - attack.lateral_movement
  - attack.t1021.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 5140
    ShareName|contains:
      - 'C$'
      - 'ADMIN$'
      - 'IPC$'
  filter:
    SubjectUserName|endswith: '$'
  condition: selection and not filter
falsepositives:
  - Backup software
  - Domain controller operations
