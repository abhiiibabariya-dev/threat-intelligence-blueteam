title: Suspicious Scheduled Task Creation
id: c3d4e5f6-a1b2-7890-cdef-567890abcdef
status: stable
level: medium
description: Detects creation of scheduled tasks commonly used for persistence
author: Blue Team Toolkit
date: 2024/01/01
references:
  - https://attack.mitre.org/techniques/T1053/005/
tags:
  - attack.persistence
  - attack.t1053.005
logsource:
  product: windows
  service: security
  category: process_creation
detection:
  selection:
    CommandLine|contains:
      - schtasks /create
      - Register-ScheduledTask
  suspicious_paths:
    CommandLine|contains:
      - \AppData\
      - \Temp\
      - \ProgramData\
      - C:\Users\Public
  condition: selection and suspicious_paths
falsepositives:
  - Legitimate software installers
  - System administration scripts
