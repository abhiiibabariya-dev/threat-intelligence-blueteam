title: Multiple Failed Logins Followed by Success
id: b5a3c7d1-4e2f-4a8b-9c1d-3e5f7a9b2c4d
status: stable
level: high
description: Detects potential brute force - multiple failed logins from same source followed by a successful login
author: Blue Team Toolkit
date: 2024/01/01
references:
  - https://attack.mitre.org/techniques/T1110/
tags:
  - attack.credential_access
  - attack.t1110.001
logsource:
  category: authentication
  product: linux
detection:
  failed:
    EventType: login_failed
  success:
    EventType: login_success
  condition: failed | count(SourceIP) by TargetUser > 5
timeframe: 10m
falsepositives:
  - Users who mistype passwords multiple times
  - Service accounts with expired credentials
