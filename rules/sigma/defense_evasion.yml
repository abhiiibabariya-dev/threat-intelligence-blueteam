# Sigma Rules - Defense Evasion Detection

title: Security Tool Process Termination
id: sigma-de-001
status: stable
level: critical
description: Detects attempts to kill security monitoring processes
author: Blue Team Toolkit
date: 2024/01/15
tags:
  - attack.defense_evasion
  - attack.t1562.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_kill:
    Image|endswith:
      - '\taskkill.exe'
      - '\net.exe'
      - '\sc.exe'
    CommandLine|contains:
      - 'MsMpEng'
      - 'McAfee'
      - 'ccSvcHst'
      - 'SentinelOne'
      - 'CrowdStrike'
      - 'csfalcon'
      - 'cbdefense'
      - 'cylance'
      - 'cortex'
      - 'ossec'
      - 'wazuh'
      - 'splunk'
      - 'elastic'
      - 'winlogbeat'
      - 'sysmon'
  condition: selection_kill
falsepositives:
  - Legitimate security tool maintenance
  - Software upgrades

---

title: Windows Event Log Tampering
id: sigma-de-002
status: stable
level: critical
description: Detects attempts to clear or disable Windows event logging
author: Blue Team Toolkit
date: 2024/01/15
tags:
  - attack.defense_evasion
  - attack.t1070.001
logsource:
  product: windows
  service: security
detection:
  selection_clear:
    EventID:
      - 1102
      - 104
  selection_disable:
    Image|endswith: '\auditpol.exe'
    CommandLine|contains: '/clear'
  selection_wevtutil:
    Image|endswith: '\wevtutil.exe'
    CommandLine|contains:
      - 'cl '
      - 'clear-log'
  condition: selection_clear or selection_disable or selection_wevtutil
falsepositives:
  - Planned log maintenance
  - Archiving operations

---

title: Process Injection via Common Techniques
id: sigma-de-003
status: experimental
level: high
description: Detects process injection techniques commonly used by malware
author: Blue Team Toolkit
date: 2024/01/15
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1055
logsource:
  product: windows
  category: create_remote_thread
detection:
  selection:
    EventID: 8
  filter:
    SourceImage|contains:
      - '\csrss.exe'
      - '\lsass.exe'
      - '\services.exe'
      - '\svchost.exe'
      - '\MsMpEng.exe'
  condition: selection and not filter
falsepositives:
  - Debugging tools
  - Some security products

---

title: Masquerading - Renamed System Binary
id: sigma-de-004
status: experimental
level: high
description: Detects execution of renamed Windows system binaries
author: Blue Team Toolkit
date: 2024/01/15
tags:
  - attack.defense_evasion
  - attack.t1036.003
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    OriginalFileName:
      - 'cmd.exe'
      - 'powershell.exe'
      - 'rundll32.exe'
      - 'regsvr32.exe'
      - 'mshta.exe'
  filter:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
      - '\mshta.exe'
  condition: selection and not filter
falsepositives:
  - Very unlikely, should be investigated
