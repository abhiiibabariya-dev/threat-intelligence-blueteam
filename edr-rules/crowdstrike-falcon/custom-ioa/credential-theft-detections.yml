# =============================================================================
# CrowdStrike Falcon Custom IOA Rules: Credential Theft
# MITRE ATT&CK: T1003 (Credential Dumping), T1558 (Kerberoasting)
# Platform: Windows
# =============================================================================

rules:
  - rule_name: "LSASS Memory Access via Procdump"
    description: "Detects procdump.exe targeting lsass.exe for credential dumping"
    mitre_technique: "T1003.001"
    mitre_tactic: "Credential Access"
    severity: "Critical"
    platform: "Windows"
    ioa_type: "Process Creation"
    enabled: true
    detection_logic:
      process_name:
        - "procdump.exe"
        - "procdump64.exe"
      command_line_contains:
        - "lsass"
        - "-ma"
      action: "Detect & Block"
    response_actions:
      - "Kill process tree"
      - "Quarantine file"
      - "Network contain host"
    false_positive_notes: "Legitimate memory dump tools used by IT support - whitelist approved procdump usage via exclusion policy"

  - rule_name: "Comsvcs.dll MiniDump of LSASS"
    description: "Detects rundll32 invoking comsvcs.dll MiniDump against lsass process"
    mitre_technique: "T1003.001"
    mitre_tactic: "Credential Access"
    severity: "Critical"
    platform: "Windows"
    ioa_type: "Process Creation"
    enabled: true
    detection_logic:
      process_name: "rundll32.exe"
      command_line_contains:
        - "comsvcs"
        - "MiniDump"
        - "#24"
      action: "Detect & Block"
    response_actions:
      - "Kill process"
      - "Network contain host"

  - rule_name: "Mimikatz Execution Detection"
    description: "Detects execution of Mimikatz or its common command-line patterns"
    mitre_technique: "T1003.001"
    mitre_tactic: "Credential Access"
    severity: "Critical"
    platform: "Windows"
    ioa_type: "Process Creation"
    enabled: true
    detection_logic:
      command_line_contains:
        - "sekurlsa::logonpasswords"
        - "sekurlsa::wdigest"
        - "lsadump::sam"
        - "lsadump::dcsync"
        - "kerberos::golden"
        - "kerberos::ptt"
        - "privilege::debug"
        - "token::elevate"
      action: "Detect & Block"
    response_actions:
      - "Kill process tree"
      - "Network contain host"
      - "Alert SOC - P1"

  - rule_name: "SAM/SYSTEM/SECURITY Hive Export"
    description: "Detects reg.exe saving SAM/SYSTEM/SECURITY registry hives"
    mitre_technique: "T1003.002"
    mitre_tactic: "Credential Access"
    severity: "High"
    platform: "Windows"
    ioa_type: "Process Creation"
    enabled: true
    detection_logic:
      process_name: "reg.exe"
      command_line_contains:
        - "save"
      command_line_regex: "(?i)(sam|system|security)"
      action: "Detect"
    response_actions:
      - "Alert SOC"

  - rule_name: "DCSync Attack via Directory Replication"
    description: "Detects non-DC machines performing directory replication (DCSync)"
    mitre_technique: "T1003.006"
    mitre_tactic: "Credential Access"
    severity: "Critical"
    platform: "Windows"
    ioa_type: "Process Creation"
    enabled: true
    detection_logic:
      command_line_contains:
        - "lsadump::dcsync"
        - "Get-ADReplAccount"
        - "DSInternals"
      action: "Detect & Block"

  - rule_name: "Kerberoasting - Request for RC4 Service Tickets"
    description: "Detects tools requesting Kerberos TGS tickets with RC4 encryption for offline cracking"
    mitre_technique: "T1558.003"
    mitre_tactic: "Credential Access"
    severity: "High"
    platform: "Windows"
    ioa_type: "Process Creation"
    enabled: true
    detection_logic:
      command_line_contains:
        - "Invoke-Kerberoast"
        - "Get-SPNUsers"
        - "Rubeus"
        - "kerberoast"
        - "GetUserSPNs"
      action: "Detect"
    response_actions:
      - "Alert SOC"
      - "Check requesting account for compromise"

  - rule_name: "Credential Vault Access"
    description: "Detects access to Windows Credential Manager vaults"
    mitre_technique: "T1555.004"
    mitre_tactic: "Credential Access"
    severity: "Medium"
    platform: "Windows"
    ioa_type: "Process Creation"
    enabled: true
    detection_logic:
      command_line_contains:
        - "vaultcmd"
        - "/listcreds"
        - "cmdkey /list"
        - "Get-ChildItem Credentials"
      action: "Detect"

  - rule_name: "NTDS.dit Database Extraction"
    description: "Detects attempts to copy or extract the Active Directory database"
    mitre_technique: "T1003.003"
    mitre_tactic: "Credential Access"
    severity: "Critical"
    platform: "Windows"
    ioa_type: "Process Creation"
    enabled: true
    detection_logic:
      process_name:
        - "ntdsutil.exe"
        - "vssadmin.exe"
      command_line_contains:
        - "ifm"
        - "create full"
        - "ntds.dit"
      action: "Detect & Block"
    response_actions:
      - "Network contain host"
      - "Alert SOC - P1"
